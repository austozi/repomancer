
{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Apps</h3>
  <div class="d-flex gap-2">
    <form method="post" action="/admin/check-all">
      <button class="btn btn-primary">Check all apps</button>
    </form>
    <a class="btn btn-success" href="/admin/app/new">Add app</a>
  </div>
</div>

<div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
  {% for a in apps %}
  <div class="col">
    <div class="card h-100 shadow-sm">
      <div class="d-flex justify-content-center align-items-center p-3" style="height:120px;">
        {% if a.icon_local_path %}
          <img src="/icons/{{ a.icon_local_path }}" alt="{{ a.name }}" style="max-height:100%;object-fit:contain;">
        {% else %}
          <div class="text-muted">No icon</div>
        {% endif %}
      </div>
      <div class="card-body">
        <h5 class="card-title mb-1"><a class="text-decoration-none" href="/admin/app/{{ a.id }}">{{ a.name }}</a></h5>
        {% if a.latest_version %}<div class="small text-muted">Latest: {{ a.latest_version }}</div>{% endif %}
      </div>
      <div class="card-footer bg-white d-flex justify-content-between">
        <a class="btn btn-sm btn-outline-primary" href="/admin/app/{{ a.id }}">Manage</a>
        <a class="btn btn-sm btn-outline-secondary" href="/admin/app/{{ a.id }}/edit">Edit</a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
